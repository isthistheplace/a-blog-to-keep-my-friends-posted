<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>a blog to keep my friends posted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400;1,500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<script>
  // Auth guard — redirect to login if not authenticated
  if (sessionStorage.getItem('fn_auth') !== '1') {
    window.location.replace('login.html');
  }
</script>
<header class="masthead">
  <div class="masthead-inner">
    <nav class="masthead-nav">
      <a href="#"></a>
      <a href="#"></a>
      <a href="#"></a>
    </nav>
    <a class="masthead-logo" href="index.html">a blog to keep my friends posted</a>
    <div class="masthead-right">
      <div class="search-wrap">
        <input class="search-input" id="searchInput" type="text" placeholder="Search posts…" autocomplete="off" />
        <button class="search-clear" id="searchClear" aria-label="Clear search">&#x2715;</button>
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="6.5" cy="6.5" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Hero image: same width as post list, natural aspect ratio -->
<div class="hero">
  <img src="imgs/PANA0995.JPG" alt="A scenic view" />
</div>

<div class="page">
  <div class="post-list" id="postList">
    
    <a class="post-row" href="2026-06-04- crush calculator.html"
       data-title="On the Crush Calculator"
       data-excerpt="And Where I think I went Wrong"
       data-date="June 5, 2026">
      <div class="post-row-left">
        <p class="post-kicker">Unnecessary Thoughts</p>
        <h2 class="post-row-title"> On the Crush Calculator </h2>
        <p class="post-row-excerpt">And Where I think I've Gone Wrong</p>
      </div>
      <div class="post-row-meta">
        <span>June 4, 2026</span>
      </div>
    </a>

    <a class="post-row" href="2026-05-31- visit new york.html"
       data-title="I visited Lucia"
       data-excerpt="There's a certain satisfaction in doing something the long way — not because you have to, but because the process itself turns out to be the point."
       data-date="May 31, 2026">
      <div class="post-row-left">
        <p class="post-kicker">Gossip</p>
        <h2 class="post-row-title">A weekend in New York</h2>
        <p class="post-row-excerpt">I visited Lucia.</p>
      </div>
      <div class="post-row-meta">
        <span>May 31, 2026</span>
      </div>
    </a>

  </div>
  <p class="no-results" id="noResults">No posts match your search.</p>
</div>

<footer>
  <p class="footer-logo">a blog to keep my friends posted</p>
  <p>&copy; 2025 Wyatt King</p>
</footer>

<script>
  const input    = document.getElementById('searchInput');
  const clearBtn = document.getElementById('searchClear');
  const searchBtn = document.getElementById('searchBtn');
  const rows     = document.querySelectorAll('.post-row');
  const noResults = document.getElementById('noResults');

  searchBtn.addEventListener('click', () => {
    if (!input.classList.contains('open')) { input.classList.add('open'); input.focus(); }
  });
  clearBtn.addEventListener('click', () => {
    input.value = ''; clearBtn.classList.remove('visible'); filterPosts(''); input.focus();
  });
  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    filterPosts(q);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Escape') { input.value = ''; input.classList.remove('open'); clearBtn.classList.remove('visible'); filterPosts(''); }
  });

  function highlight(text, query) {
    if (!query) return text;
    const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp(`(${esc})`, 'gi'), '<mark>$1</mark>');
  }

  function filterPosts(query) {
    const q = query.toLowerCase();
    let visible = 0;
    rows.forEach(row => {
      const matches = !q || [row.dataset.title, row.dataset.excerpt, row.dataset.date]
        .some(f => (f || '').toLowerCase().includes(q));
      row.classList.toggle('hidden', !matches);
      if (matches) {
        visible++;
        row.querySelector('.post-row-title').innerHTML    = highlight(row.querySelector('.post-row-title').textContent, query);
        row.querySelector('.post-row-excerpt').innerHTML  = highlight(row.querySelector('.post-row-excerpt').textContent, query);
        const dateEl = row.querySelector('.post-row-meta span');
        if (dateEl) dateEl.innerHTML = highlight(dateEl.textContent, query);
      }
    });
    noResults.style.display = (visible === 0 && q) ? 'block' : 'none';
  }
</script>

</body>
</html>
